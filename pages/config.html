    <div class="container">
        <h1>Configurações</h1>
        <form>
            <!-- Configurações de conta -->
            <section>
                <h2>Conta</h2>
                <label for="username">Nome de usuário:</label>
                <input type="text" id="username" name="username" placeholder="Digite seu nome de usuário">
                
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail">
            </section>

            <!-- Configurações de privacidade -->
            <section>
                <h2>Privacidade</h2>
                <label for="notifications">
                    <input type="checkbox" id="notifications" name="notifications">
                    Receber notificações
                </label>
                
                <label for="public-profile">
                    <input type="checkbox" id="public-profile" name="public-profile">
                    Tornar perfil público
                </label>
            </section>

            <!-- Tema -->
            <section>
                <h2>Tema</h2>
                <label for="theme">Escolha o tema:</label>
                <select id="theme" name="theme">
                    <option value="light">Claro</option>
                    <option value="dark">Escuro</option>
                </select>
            </section>

            <button type="submit">Salvar alterações</button>
        </form>
