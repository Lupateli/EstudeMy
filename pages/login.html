<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudeMY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/style/style_Logo_login.css">
    <link rel="stylesheet" href="/style/style_login.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="login-container">
        <h1>LOGIN <br> <span>ESTUDE.MY</span></h1>
        <input type="email" placeholder="Email" name="Email" class="inputs" id="Email" required>
        <input type="password" placeholder="Senha" name="Senha" class="inputs" id="Senha" required>
        <div class="checkbox-container">
            <input class="lembrar" type="checkbox" id="lembrar">
            <label for="lembrar">Lembrar-se</label>
        </div>
        <div class="buttons">
            <button class="entrar" onclick="window.location.href='/pages/main_page.html'">ENTRAR</button>
            <button class="cadastrar-se" onclick="window.location.href='/pages/cadastro.html'">CADASTRO</button>
        </div>        
    </div>
</body>
</html>
