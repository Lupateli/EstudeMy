<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/style/style_Logo login.css">
    <link rel="stylesheet" href="/style/style_Login Cadastro.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

    <div class="login-container" id="loginContainer">
        <h1>CADASTRO <br>
            <div class="logo">
                <span class="E">E</span>
                <span class="S">S</span>
                <span class="T">T</span>
                <span class="U">U</span>
                <span class="D">D</span>
                <span class="E2">E</span>
                <span class="ponto">.</span>
                <span class="M">M</span>
                <span class="Y">Y</span>
            </div>
        </h1>
        <div class="radio-container">
            <label class="radios">Sou:
                <input type="radio" name="userType" value="professor" id="professorRadio">
                Professor
            </label>
            <label>
                <input type="radio" name="userType" value="aluno" id="alunoRadio">
                Aluno
            </label>
        </div>
        <input type="text" placeholder="Usuário" name="usuario" class="inputs" required>
        <input type="email" placeholder="Email" name="email" class="inputs" required>
        <input type="password" placeholder="Senha" name="senha" class="inputs" required>
        <input type="password" placeholder="Confirme sua Senha" name="confirmaSenha" class="inputs" required>
        <div class="cadastros">
            <button class="cadastrar" id="submitButton">Cadastrar-se</button>
        </div>
    </div>

    <div id="customAlert" class="custom-alert">
        <div class="alert-content">
            <h2 id="alertTitle">Alerta</h2>
            <p id="alertMessage">Mensagem de exemplo.</p>
            <button id="closeAlert">OK</button>
        </div>
    </div>

    <script src="/script/script_cadastro.js"></script>
</body>

</html>
